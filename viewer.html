<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pt">樂放旅遊 行前說明</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--g:#81F8B9;--gd:#1a5c3a;--gp:#eafaf3;--pk:#ECD1D5;--tm:#EE6543;--dk:#1a1a1a;--md:#555;--sf:#888;--bg:#fff;--bg2:#f7f8f6;--bd:#ebebeb;--r:18px;--sh:0 2px 16px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--dk);line-height:1.7;font-size:15px}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:54px}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{height:34px;width:34px;object-fit:cover;border-radius:8px}
.nav-brand{font-size:12px;font-weight:700;color:var(--md)}
.nav-toc{background:var(--g);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--dk);font-family:inherit}
.drawer-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4)}
.drawer-bg.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:270px;background:#fff;z-index:201;padding:22px 18px;transform:translateX(100%);transition:transform .28s ease;overflow-y:auto}
.drawer-bg.open .drawer{transform:translateX(0)}
.drawer h3{font-size:12px;color:var(--sf);margin-bottom:14px;letter-spacing:.1em}
.drawer a{display:block;padding:9px 0;border-bottom:1px solid #f2f2f2;text-decoration:none;color:var(--dk);font-size:13px;font-weight:500}
.drawer-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--sf)}
.hero{background:var(--dk);min-height:88vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:56px 22px 40px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(129,248,185,.16) 0%,transparent 60%),radial-gradient(ellipse 50% 35% at 80% 20%,rgba(236,209,213,.18) 0%,transparent 55%)}
.hero-logo{width:100px;height:100px;border-radius:22px;overflow:hidden;margin-bottom:24px;position:relative;z-index:1}
.hero-logo img{width:100%;height:100%;object-fit:cover}
.hero-tag{background:var(--g);color:var(--dk);font-size:11px;font-weight:800;letter-spacing:.12em;padding:4px 14px;border-radius:20px;margin-bottom:18px;position:relative;z-index:1;display:inline-block}
.hero h1{font-size:clamp(28px,7vw,46px);font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px;position:relative;z-index:1}
.hero h1 em{color:var(--g);font-style:normal}
.hero-sub{font-size:15px;color:rgba(255,255,255,.55);margin-bottom:32px;position:relative;z-index:1}
.hero-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:36px;position:relative;z-index:1}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,.8)}
.pill strong{color:var(--g)}
.scroll-hint{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.1em;position:relative;z-index:1;animation:bob 2s infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.sec{padding:44px 20px;max-width:640px;margin:0 auto}
.sec-tinted{background:var(--bg2)}
.sec-label{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sec-label h2{font-size:17px;font-weight:700}
.sec-label p{font-size:12px;color:var(--sf);margin-top:2px}
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:12px}
.card-g{border-left:4px solid var(--g)}.card-p{border-left:4px solid var(--pk)}.card-t{border-left:4px solid var(--tm)}.card-b{border-left:4px solid #99EBF7}.card-y{border-left:4px solid #E3FF85}
.info-row{display:flex;gap:8px;margin-bottom:9px;align-items:flex-start}
.ir-label{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--sf);min-width:68px;padding-top:2px;text-transform:uppercase}
.ir-val{font-size:14px;color:var(--dk);flex:1}
.ir-val strong{color:var(--tm)}
.flight-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.flight-table th{background:var(--dk);color:#fff;padding:7px 9px;text-align:left;font-weight:500}
.flight-table th:first-child{border-radius:8px 0 0 0}.flight-table th:last-child{border-radius:0 8px 0 0}
.flight-table td{padding:9px;border-bottom:1px solid #f0f0f0}
.flight-table tr:last-child td{border-bottom:none}
.fbadge{background:var(--g);color:var(--dk);font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px}
.fbadge-p{background:var(--pk)}
.divider{height:1px;background:#f0f0f0;margin:0 20px}
.day-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:14px}
.day-hdr{display:flex;align-items:stretch}
.day-num{background:var(--dk);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:62px;padding:14px 8px;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.45)}
.day-num span{font-size:26px;font-weight:700;color:var(--g);line-height:1}
.day-ttl{padding:13px 15px;flex:1}
.day-ttl .date{font-size:11px;color:var(--sf);margin-bottom:3px}
.day-ttl h3{font-size:14px;font-weight:700;line-height:1.4}
.day-body{padding:14px 18px 18px}
.spot{display:flex;gap:11px;margin-bottom:13px;align-items:flex-start}
.spot-dot{width:7px;height:7px;border-radius:50%;background:var(--g);margin-top:6px;flex-shrink:0}
.spot h4{font-size:14px;font-weight:700;margin-bottom:3px}
.spot p{font-size:13px;color:var(--sf);line-height:1.6}
.meal-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid #f5f5f5}
.meal-chip{background:var(--bg2);border-radius:9px;padding:5px 11px;font-size:12px}
.hotel-chip{background:#f0f0f0;border-radius:9px;padding:4px 11px;font-size:12px;color:var(--md);margin-top:7px;display:inline-flex;align-items:center;gap:5px}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tip-card{background:#fff;border:1px solid var(--bd);border-radius:15px;padding:15px;box-shadow:var(--sh)}
.tip-card .ti{font-size:20px;margin-bottom:7px}
.tip-card h4{font-size:13px;font-weight:700;margin-bottom:5px}
.tip-card p{font-size:12px;color:var(--sf);line-height:1.6}
.steps{counter-reset:step}
.step-item{display:flex;gap:13px;align-items:flex-start;margin-bottom:13px}
.step-item::before{counter-increment:step;content:counter(step);width:26px;height:26px;border-radius:50%;background:var(--g);color:var(--dk);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-item p{font-size:14px;color:var(--md);line-height:1.6}
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.check-item{display:flex;align-items:center;gap:7px;background:var(--bg2);border-radius:9px;padding:7px 11px;font-size:13px}
.check-item::before{content:"○";color:#b1d3c5;font-size:13px;flex-shrink:0}
.emergency{background:var(--dk);border-radius:var(--r);padding:22px;color:#fff}
.emergency h3{color:var(--g);font-size:15px;font-weight:800;margin-bottom:14px}
.em-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.em-row:last-child{border-bottom:none}
.em-label{font-size:12px;color:rgba(255,255,255,.45)}
.em-val{font-size:14px;font-weight:800;color:var(--g)}
footer{background:var(--dk);color:rgba(255,255,255,.35);text-align:center;padding:28px 20px;font-size:12px;line-height:2}
footer .brand{color:var(--g);font-weight:800;font-size:14px;margin-bottom:6px}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--sf)}
.loading-dot{width:10px;height:10px;border-radius:50%;background:var(--g);animation:ldot 1.2s ease-in-out infinite}
@keyframes ldot{0%,100%{transform:scale(.5);opacity:.4}50%{transform:scale(1);opacity:1}}
.fade-up{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
@media(max-width:400px){.tips-grid,.checklist{grid-template-columns:1fr}}
</style>
</head>

function od(){document.getElementById('db').classList.add('open')}
function cd(){document.getElementById('db').classList.remove('open')}
function s(v,f){return(v&&v!=='undefined'&&v!=='null')?v:(f||'')}
function gp(k){return new URLSearchParams(location.search).get(k)}
async function load(){
  const id=gp('id');
  if(!id){err('找不到電子書 ID，請確認連結。');return;}
  const base=location.pathname.replace(/\/[^\/]*$/,'');
  try{
    const r=await fetch(base+'/data/'+id+'.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){err('無法載入行前說明（'+e.message+'）');}
}
function err(msg){document.getElementById('app').innerHTML='<div class="loading"><div style="font-size:32px">⚠️</div><div style="color:#a8071a">'+msg+'</div></div>';}
function render(d){

  const emC=(em.contacts||[]).map(c=>'<div class="em-row"><span class="em-label">'+c.label+'</span><span class="em-val">'+c.value+'</span></div>').join('');

  const body=`
${nav}${hero}

<div class="card card-g"><div class="info-row"><span class="ir-label">集合時間</span><span class="ir-val"><strong>${s(m.assemblyTime)}</strong></span></div><div class="info-row"><span class="ir-label">集合地點</span><span class="ir-val">${s(m.assemblyPlace)}</span></div></div>
<div class="card"><table class="flight-table"><thead><tr><th></th><th>航班</th><th>出發 → 抵達</th></tr></thead><tbody>${m.flightOut?'<tr><td><span class="fbadge">去程</span></td><td colspan="2">'+m.flightOut+'</td></tr>':''}${m.flightReturn?'<tr><td><span class="fbadge fbadge-p">回程</span></td><td colspan="2">'+m.flightReturn+'</td></tr>':''}</tbody></table><p style="font-size:11px;color:#aaa;margin-top:8px">※ 航班時間以出發前說明會資料為準</p></div>
</section><div class="divider"></div>
<section class="sec fade-up" id="it"><div class="sec-label"><div class="sec-icon" style="background:#fff3e0">🗺️</div><div><h2>行程總覽</h2><p>${(d.days||[]).length} 天精華路線</p></div></div>
<div class="card" style="background:var(--dk);color:#fff;border:none"><div style="display:flex;gap:14px;align-items:center;margin-bottom:14px"><div style="font-size:28px">🏨</div><div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:3px">住宿</div><div style="font-weight:700;color:var(--g)">${s(m.hotel,'全程住宿')}</div></div></div>${(d.days||[]).map(day=>'<div style="background:rgba(255,255,255,.06);border-radius:11px;padding:11px;margin-bottom:7px"><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px">第'+day.day+'天 '+s(day.date)+'</div><div style="font-size:13px;color:#fff">'+(day.spots||[]).map(sp=>sp.name).join('・')+'</div></div>').join('')}</div>
</section><div class="divider"></div>
<section class="sec fade-up" id="dy"><div class="sec-label"><div class="sec-icon" style="background:#e8f9f1">📅</div><div><h2>每日詳細行程</h2><p>景點介紹・餐食・住宿</p></div></div>${days}</section><div class="divider"></div>
<div class="sec-tinted"><section class="sec fade-up" id="tp" style="max-width:100%;padding-left:20px;padding-right:20px"><div style="max-width:640px;margin:0 auto"><div class="sec-label"><div class="sec-icon" style="background:#fff3e0">💡</div><div><h2>旅遊注意事項</h2><p>出發前請仔細閱讀</p></div></div><div class="tips-grid">${tipsG}</div></div></section></div><div class="divider"></div>
<section class="sec fade-up" id="im"><div class="sec-label"><div class="sec-icon" style="background:#e8f0ff">🛂</div><div><h2>入境手續</h2><p>${s(imm.visa)}</p></div></div><div class="card card-b">${imm.qcode?'<p style="font-size:13px;color:var(--md);margin-bottom:14px">'+imm.qcode+'</p>':''}<div class="steps">${immS}</div></div></section><div class="divider"></div>
<section class="sec fade-up" id="tx"><div class="sec-label"><div class="sec-icon" style="background:#fff8e1">🧾</div><div><h2>退稅說明</h2><p>滿 ${s(tax.threshold,'30,000韓圜')} 即可退稅</p></div></div><div class="card card-y"><div class="steps">${taxS}</div></div></section><div class="divider"></div>
<div class="sec-tinted"><section class="sec fade-up" id="ck" style="max-width:100%;padding-left:20px;padding-right:20px"><div style="max-width:640px;margin:0 auto"><div class="sec-label"><div class="sec-icon" style="background:#f3e8ff">🎒</div><div><h2>行李攜帶清單</h2><p>出發前對照確認</p></div></div><p style="font-size:12px;font-weight:700;color:var(--sf);margin-bottom:9px">出發前必備</p><div class="checklist" style="margin-bottom:18px">${chkB}</div><p style="font-size:12px;font-weight:700;color:var(--sf);margin-bottom:9px">隨身行李</p><div class="checklist" style="margin-bottom:16px">${chkC}</div>${chk.forbidden?'<div class="card" style="background:var(--tm);border:none;color:#fff"><p style="font-size:13px;font-weight:700;margin-bottom:5px">⚠️ 禁止攜帶</p><p style="font-size:13px;opacity:.9">'+chk.forbidden+'</p></div>':''}</div></section></div><div class="divider"></div>
<section class="sec fade-up" id="dp"><div class="sec-label"><div class="sec-icon" style="background:#fce4ec">🚢</div><div><h2>出境集合須知</h2><p>${s(dep.assemblyTime)}</p></div></div><div class="card card-p">${depR}</div></section><div class="divider"></div>
<section class="sec fade-up" id="em"><div class="sec-label"><div class="sec-icon" style="background:#ffebee">📞</div><div><h2>緊急聯絡資訊</h2><p>截圖存起來備用</p></div></div>
<div class="emergency"><h3>🆘 重要電話</h3>${m.leaderName?'<div class="em-row"><span class="em-label">領隊 '+m.leaderName+'</span><span class="em-val">'+s(m.leaderPhone)+'</span></div>':''}${em.international?'<div class="em-row"><span class="em-label">國際救援</span><span class="em-val">'+em.international+'</span></div>':''}${em.overseas?'<div class="em-row"><span class="em-label">旅外急難</span><span class="em-val">'+em.overseas+'</span></div>':''}${emC}</div>
${em.insurance?'<div class="card" style="margin-top:12px;background:var(--bg2)"><p style="font-size:13px;font-weight:700;margin-bottom:7px">📋 保險說明</p><p style="font-size:13px;color:var(--md)">'+em.insurance+'</p></div>':''}
</section>
<footer><div class="brand">樂放旅遊 Le Fun Travel</div><div>${s(m.tourName)} · ${s(m.destination)} · ${s(m.departDate)}–${s(m.returnDate)}</div><div style="margin-top:6px">行程內容如有異動，以出發前說明會資料為準</div><div style="margin-top:14px;opacity:.3">Powered by Le Fun Travel × AI 電子書系統</div></footer>`;

  document.getElementById('app').innerHTML=body;
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.08});
  document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
}
load();
</script>
